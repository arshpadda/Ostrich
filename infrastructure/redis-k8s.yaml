apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: redis-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        # Require a password. The secret is created out-of-band (not committed):
        #   kubectl create secret generic redis-auth \
        #     --from-literal=REDIS_PASSWORD=<pw> -n redis-system
        command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-auth
              key: REDIS_PASSWORD
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
          initialDelaySeconds: 2
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: redis-system
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
