apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ai-gateway
data:
  config.yaml: |
    model_list:
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY
    litellm_settings:
      drop_params: true
      set_verbose: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-v1.40.14
          args: ["--config", "/app/config.yaml"]
          ports:
            - containerPort: 4000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: GEMINI_API_KEY
            # Master key is sourced from the litellm-secrets Secret, not hardcoded.
            # The cluster NetworkPolicy is the primary access control; this key is
            # a defense-in-depth credential shared with sandbox clients.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: LITELLM_MASTER_KEY
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: ai-gateway
spec:
  selector:
    app: litellm-proxy
  ports:
    - port: 4000
      targetPort: 4000
