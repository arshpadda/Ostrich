# agent-sandbox SandboxTemplate + SandboxWarmPool for the Ostrich agent harness.
# The warm pool keeps pre-initialized sandboxes ready so the control plane can
# claim one in milliseconds (replacing the hand-built Pod in orchestrator.py).
# Each pod runs the existing Redis-streaming LangGraph worker; the worker keys
# its Redis channel off its own hostname (== Sandbox/pod name).
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: ostrich-sandbox-template
  namespace: sandbox-chat
spec:
  # Zero-trust egress: the controller manages a per-sandbox NetworkPolicy that
  # default-denies egress except the entries below. The :443 rule exists only for
  # local dev (the worker calls Gemini directly); in production, drop it so all
  # LLM traffic must traverse the in-cluster gateway (ai-gateway:4000).
  networkPolicyManagement: Managed
  networkPolicy:
    egress:
      - to:  # DNS resolution
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
        ports:
          - { protocol: UDP, port: 53 }
          - { protocol: TCP, port: 53 }
      - to:  # Redis pub/sub (streaming data plane)
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: redis-system
        ports:
          - { protocol: TCP, port: 6379 }
      - to:  # LLM gateway (LiteLLM proxy)
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: ai-gateway
        ports:
          - { protocol: TCP, port: 4000 }
      - ports:  # HTTPS — LOCAL direct-LLM only; remove for gateway-only prod egress
          - { protocol: TCP, port: 443 }
  # Persistent per-sandbox workspace (survives hibernate/resume), mounted at
  # /workspace where the agent's file tools operate.
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  podTemplate:
    spec:
      runtimeClassName: gvisor
      containers:
        - name: agent-harness
          image: ostrich-sandbox:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://redis.redis-system.svc.cluster.local:6379
            - name: METRICS_PORT
              value: "8000"
            # Local/standalone: talk to Gemini directly. In the cluster proper,
            # set LITELLM_PROXY_URL instead so traffic routes via the gateway.
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ostrich-llm
                  key: GEMINI_API_KEY
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: ostrich-warmpool
  namespace: sandbox-chat
spec:
  # Number of pre-warmed sandboxes kept ready for instant claims. Bump this with
  # expected concurrency so a new session never waits on a cold start; each warm
  # pod costs its request footprint (250m CPU / 256Mi) while idle.
  replicas: 2
  sandboxTemplateRef:
    name: ostrich-sandbox-template
